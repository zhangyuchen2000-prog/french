<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#efe9df" />
  <title>Cinq — Five French Words a Day</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">DAILY FRENCH</p>
        <h1>Cinq</h1>
      </div>
      <button id="settingsBtn" class="icon-btn" aria-label="Open settings">☰</button>
    </header>

    <section class="hero">
      <div>
        <p id="dateLabel" class="date"></p>
        <h2>Five words.<br>One small win.</h2>
      </div>
      <div class="streak-card">
        <span id="streakCount" class="streak-number">0</span>
        <span class="streak-label">day streak</span>
      </div>
    </section>

    <section class="progress-wrap" aria-label="Daily progress">
      <div class="progress-meta">
        <span>Today</span>
        <span id="progressText">0 / 5 learned</span>
      </div>
      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
    </section>

    <section id="wordList" class="word-list"></section>

    <section class="actions">
      <button id="quizBtn" class="primary-btn">Start today’s quiz</button>
      <button id="reviewBtn" class="secondary-btn">Review learned words</button>
    </section>

    <section class="week-section">
      <div class="section-heading">
        <h3>This week</h3>
        <span id="weekSummary">0 / 35</span>
      </div>
      <div id="weekGrid" class="week-grid"></div>
    </section>
  </main>

  <dialog id="wordDialog" class="modal">
    <button class="close-btn" data-close="wordDialog" aria-label="Close">×</button>
    <p id="dialogTheme" class="eyebrow"></p>
    <h2 id="dialogFrench"></h2>
    <p id="dialogPhonetic" class="phonetic"></p>
    <p id="dialogMeaning" class="meaning"></p>
    <div class="example-box">
      <p id="dialogExample"></p>
      <p id="dialogTranslation"></p>
    </div>
    <div class="modal-actions">
      <button id="speakBtn" class="secondary-btn">Hear pronunciation</button>
      <button id="learnBtn" class="primary-btn">Mark as learned</button>
    </div>
  </dialog>

  <dialog id="quizDialog" class="modal quiz-modal">
    <button class="close-btn" data-close="quizDialog" aria-label="Close">×</button>
    <p class="eyebrow">TODAY’S QUIZ</p>
    <div id="quizContent"></div>
  </dialog>

  <dialog id="settingsDialog" class="modal">
    <button class="close-btn" data-close="settingsDialog" aria-label="Close">×</button>
    <p class="eyebrow">SETTINGS</p>
    <h2>Your daily ritual</h2>
    <label class="setting-row">
      <span>Daily reminder time</span>
      <input id="reminderTime" type="time" value="19:00" />
    </label>
    <label class="setting-row">
      <span>Show Chinese meaning</span>
      <input id="showChinese" type="checkbox" checked />
    </label>
    <button id="saveSettings" class="primary-btn">Save settings</button>
    <p class="settings-note">Your progress stays on this device. Add the app to your Home Screen for an app-like experience.</p>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
